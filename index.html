<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hi Chakku 💖</title>
  <style>
    :root{
      --bg:#f1fbff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:rgba(15,23,42,.68);
      --pink:#14b8a6;      /* teal */
      --pink2:#ffe4d6;     /* peach */
      --shadow:0 16px 45px rgba(2, 44, 54, .10);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:
        radial-gradient(circle at 12% 12%, #ccfbf1 0 18%, transparent 19%),
        radial-gradient(circle at 88% 14%, #ffe4d6 0 16%, transparent 17%),
        radial-gradient(circle at 18% 88%, #bae6fd 0 18%, transparent 19%),
        radial-gradient(circle at 86% 84%, #fecaca 0 14%, transparent 15%),
        var(--bg);
      color:var(--text); overflow-x:hidden;
    }
    .wrap{max-width:980px;margin:0 auto;padding:26px}
    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:26px;
      box-shadow:var(--shadow);
      overflow:hidden;
      border: 1px solid rgba(0,0,0,.06);
    }
    header{display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    h1{margin:0;font-size:2rem;letter-spacing:-.02em}
    .sub{margin:6px 0 0;color:var(--muted)}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 12px;border-radius:999px;background:rgba(20,184,166,.10);
      border:1px solid rgba(0,0,0,.06);font-weight:900;
    }
    .gifRow{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:14px}
    .gif{width:min(360px,100%);border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.06)}
    .q{margin:18px 0 10px;font-size:1.25rem;line-height:1.25;min-height:2.6em}
    .btnArea{position:relative;padding-top:6px}
    .btns{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button{
      border:0;border-radius:999px;padding:12px 16px;font-weight:900;cursor:pointer;
      transition:transform .12s ease, filter .12s ease; user-select:none;
      will-change: transform;
    }
    button:hover{transform:translateY(-1px);filter:brightness(1.02)}
    button:active{transform:translateY(1px) scale(.99)}
    .primary{background:var(--pink);color:#fff}
    .ghost{background:var(--pink2);color:var(--text)}
    .response{
      margin-top:14px;
      background: rgba(20,184,166,.10);
      border:1px solid rgba(0,0,0,.06);
      padding:12px 14px;border-radius:14px;display:none
    }
    .endNote{
      margin-top:14px;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid rgba(0,0,0,.06);
      background: rgba(255,228,214,.55);
      font-weight:900;
      font-size:1.15rem;
      display:none;
    }
    .metaRow{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px}
    .progressWrap{flex:1;min-width:220px;background:rgba(0,0,0,.06);height:10px;border-radius:999px;overflow:hidden}
    .bar{height:100%;width:0%;background:var(--pink);border-radius:999px;transition:width .25s ease}
    .tiny{color:var(--muted);font-size:.95rem}
    .footer{margin-top:16px;color:var(--muted);font-size:.92rem}

    /* floating hearts */
    .heart{
      position:fixed;left:50%;top:105%;font-size:18px;opacity:.92;pointer-events:none;
      animation:floatUp linear forwards;filter:drop-shadow(0 6px 10px rgba(0,0,0,.12));
    }
    @keyframes floatUp{
      from{transform:translate(-50%,0) scale(1)}
      to{transform:translate(calc(-50% + var(--drift)),calc(-120vh)) scale(var(--scale));opacity:0}
    }

    /* "No" special animations */
    .noFloat{ position: relative; transform: translateZ(0); }
    .noFloat.runaway{ transition: transform .35s ease; }
    .shake{ animation: shake .25s ease-in-out 2; }
    @keyframes shake{
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-4px)}
      75%{transform:translateX(4px)}
    }

    /* quick pop */
    .pop{ animation: pop .18s ease-out 1; }
    @keyframes pop{
      from{ transform: scale(.98); opacity: .6; }
      to{ transform: scale(1); opacity: 1; }
    }

    /* kiss game box tweaks */
    #kissGame .btns{ position:relative; min-height:80px; }
    #kissBtn{ position:absolute; left:0; top:0; }

    code{background:rgba(0,0,0,.04);padding:2px 6px;border-radius:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <header>
        <div>
          <h1>Hi Chakku 💖</h1>
          <p class="sub">Welcome to the Relationship Audit™ (I am the auditor). 🫶</p>
        </div>
        <div class="pill" id="statusPill">💌 Booting up Cupid OS…</div>
      </header>

      <div class="gifRow">
        <img class="gif" id="topGif" alt="cute valentine gif" />
        <span class="pill" id="jokePill">🧠 Loading jokes… please stand by.</span>
      </div>

      <div id="question" class="q"></div>

      <div class="btnArea">
        <div class="btns" id="buttons"></div>
      </div>

      <div class="response" id="responseBox"></div>

      <!-- STEAL A KISS MINI-GAME -->
      <div class="response" id="kissBox" style="display:none;"></div>
      <div class="btnArea" id="kissGame" style="display:none; margin-top:10px;">
        <div class="btns">
          <button id="kissBtn" class="primary">Steal a kiss 💋</button>
          <button id="kissDone" class="ghost" style="margin-left:auto;">Done 😌</button>
        </div>
      </div>

      <!-- FINAL LOVE MESSAGE -->
      <div class="endNote" id="endNote">I love you so much Chakku 💖</div>

      <div class="metaRow">
        <div class="progressWrap"><div class="bar" id="bar"></div></div>
        <div class="tiny" id="progressText"></div>
      </div>

      <div class="footer">
        Public site ✅ No personal photos. Edit questions inside <code>steps</code>.
      </div>
    </div>
  </div>

<script>
  const gifs = [
    "https://media.giphy.com/media/56y5JGqQPhfcQ/giphy.gif",
    "https://media.giphy.com/media/Gpqk76tiVKjn2/giphy.gif",
    "https://media.giphy.com/media/3CCXHZWV6F6O9VQ7FL/giphy.gif",
    "https://media.giphy.com/media/6KmLHrQhAeH5fC0ZT1/giphy.gif"
  ];

  const extraLines = [
    "🧾 This will be used in future debates (lovingly).",
    "📌 Screenshotting your answer mentally.",
    "🚨 Cupid has been notified.",
    "🫶 Congrats. You passed the vibe check.",
    "🤨 Bold choice. Respect (small).",
    "🧠 I’ll remember this forever. Or until snacks."
  ];

  const statusByChaos = [
    "💌 Booting up Cupid OS…",
    "💘 Vibes detected.",
    "🫶 Cuteness levels rising…",
    "🚨 Danger: excessive romance.",
    "🧨 CHAOS MODE: enabled."
  ];

  const jokePills = [
    "🫣 I made this instead of being normal.",
    "🍫 Payment accepted in chocolates only.",
    "📎 Attached: my heart. Please don’t misplace it.",
    "🧸 Warning: this page may cause smiling.",
    "🧿 Nazar-proofing our vibes."
  ];

  const steps = [
    {
      q: "How obsessed with me are you today? 😌",
      gifIndex: 2,
      choices: [
        { t:"Normal amount 😇",   chaos:1, r:"Aww. ‘Normal’… suspicious. I’ll fix that." },
        { t:"Concerning amount 😳", chaos:2, r:"Correct. This is the healthy amount (for us)." },
        { t:"Legally actionable 😭", chaos:3, r:"Great. I’m calling my lawyer: Cupid." },
        { t:"Yes.",              chaos:4, r:"The most powerful answer in the English language. ✅" }
      ]
    },
    {
      q: "Choose your current mood (be honest 😌):",
      gifIndex: 3,
      choices: [
        { t:"Angel 😇", chaos:1, r:"Angel?? Show me the receipts. 😌" },
        { t:"Menace 😈", chaos:4, r:"Menace detected. I will still kiss the menace." },
        { t:"Sleepy 🥱", chaos:2, r:"Sleepy?? I’ll tuck you in… then steal your attention." },
        { t:"All of the above (correct)", chaos:3, r:"A multi-talented icon. I’m proud." }
      ],
      onPick: (choiceText) => {
        if (choiceText.includes("Sleepy")) {
          spawnHearts(12, ["🥱","🛌","💤","🫶"]);
          return "💤 Initiating cuddle.exe… loading…";
        }
        if (choiceText.includes("Menace")) {
          spawnHearts(10, ["😈","🔥","💘","🫶"]);
          return "😈 Menace mode accepted. Deploying ‘hold hands aggressively’ protocol.";
        }
        return null;
      }
    },
    {
      q: "Pick our Valentine plan (choose wisely, I’m watching):",
      gifIndex: 1,
      choices: [
        { t:"Cosy + snacks 🍿", chaos:2, r:"Correct. We will become one with the blanket." },
        { t:"Dinner out 🍝", chaos:2, r:"Fancy! I will pretend I’m a functioning adult." },
        { t:"Long drive + music 🚗", chaos:3, r:"Okay main character. I’m choosing the playlist." },
        { t:"You decide, I’ll just cling 💞", chaos:4, r:"Clinginess approved. I’m the same." }
      ]
    },
    {
      q: "Choose the compliment I should spam today:",
      gifIndex: 0,
      choices: [
        { t:"You’re adorable 🥹", chaos:2, r:"Spam scheduled: every 7 minutes. 🥹" },
        { t:"You’re my favourite person 😭", chaos:3, r:"Same. Unfortunately for you, I’m attached now." },
        { t:"You’re literally iconic ✨", chaos:2, r:"Correct. Your fan club (me) is seated." },
        { t:"All of them. Repeatedly.", chaos:4, r:"Understood. Compliments will arrive violently." }
      ]
    },

    {
      q: "What best describes me? (choose carefully 😌)",
      gifIndex: 2,
      choices: [
        { t:"A literal angel 😇", chaos:2, r:"Correct. Heavenly behaviour (most of the time)." },
        { t:"A cute menace 🐒", chaos:4, r:"Menace?? wow. Accurate. I accept." },
        { t:"Soft baby ✨", chaos:3, r:"Soft baby confirmed. Handle with hugs only." },
        { t:"Sleepyhead royalty 🥱👑", chaos:4, r:"Correct. Your throne is the bed and your kingdom is naps." }
      ],
      onPick: (choiceText) => {
        if (choiceText.includes("angel")) {
          spawnHearts(10, ["😇","✨","🫶"]);
          return "😇 Halo installed successfully.";
        }
        if (choiceText.includes("menace")) {
          spawnHearts(12, ["🐒","😈","🔥","💘"]);
          return "🐒 Chaos detected. I love it here.";
        }
        if (choiceText.includes("Soft")) {
          spawnHearts(12, ["🥹","🧸","🫶"]);
          return "🧸 Warning: may randomly demand cuddles.";
        }
        if (choiceText.includes("Sleepyhead")) {
          spawnHearts(12, ["🥱","💤","🛌","👑","🫶"]);
          return "👑 All hail the nap queen/king. Bedtime is now law.";
        }
        return null;
      }
    },

    {
      q: "Pick my most dangerous habit:",
      gifIndex: 3,
      choices: [
        { t:"Stealing your attention 24/7 👀", chaos:4, r:"Guilty. Your attention is my favourite snack." },
        { t:"Being too cute to argue with 🥹", chaos:3, r:"Unfair advantage? Yes. Will I stop? No." },
        { t:"Overthinking… then pretending I’m chill 😌", chaos:2, r:"I’m calm. (I am not calm.)" },
        { t:"Missing you even when you’re literally here 🤝", chaos:4, r:"Clinginess is my love language. Don’t judge me." }
      ],
      onPick: (choiceText) => {
        if (choiceText.includes("attention")) {
          spawnHearts(10, ["👀","💘","🫶"]);
          return "👀 Looking at you respectfully (lying).";
        }
        if (choiceText.includes("cute")) {
          spawnHearts(12, ["🥹","💞","🫶","✨"]);
          return "🥹 Court rules: cuteness wins by default.";
        }
        if (choiceText.includes("Overthinking")) {
          spawnHearts(10, ["🧠","😌","🫶"]);
          return "🧠 Brain: 100 tabs open.";
        }
        if (choiceText.includes("Missing you")) {
          spawnHearts(12, ["🤝","💞","💘","🫶"]);
          return "🤝 Come here. Closer. Closer.";
        }
        return null;
      }
    },

    {
      q: "Final boss question: will you be my Valentine? 💖",
      gifIndex: 0,
      choices: [
        { t:"YES 💖", chaos:4, r:"✅ Accepted. Congratulations, you are now mine (affectionately)." },
        { t:"Absolutely YES 💘", chaos:4, r:"We love enthusiasm. Cupid is doing backflips." },
        { t:"YES!!! 😭", chaos:4, r:"Screaming crying throwing confetti. Same." },
        { t:"I thought you’d never ask 💞", chaos:4, r:"I ask daily… in my heart." },
        { t:"No 😒", chaos:0, r:"Nice try. That button is decorative.", isNo:true }
      ]
    }
  ];

  const questionEl = document.getElementById("question");
  const buttonsEl  = document.getElementById("buttons");
  const responseBox= document.getElementById("responseBox");
  const barEl      = document.getElementById("bar");
  const progressEl = document.getElementById("progressText");
  const topGifEl   = document.getElementById("topGif");
  const statusPill = document.getElementById("statusPill");
  const jokePill   = document.getElementById("jokePill");
  const endNote    = document.getElementById("endNote");

  // Kiss game elements
  const kissGame = document.getElementById("kissGame");
  const kissBtn  = document.getElementById("kissBtn");
  const kissDone = document.getElementById("kissDone");
  const kissBox  = document.getElementById("kissBox");
  let kisses = 0;

  let i = 0;
  let chaosScore = 0;

  function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function typewriter(text, el, speed=14){
    el.textContent = "";
    let idx = 0;
    const t = setInterval(() => {
      el.textContent += text[idx++];
      if (idx >= text.length) clearInterval(t);
    }, speed);
  }

  function setTopGif(step){
    topGifEl.src = gifs[step.gifIndex ?? 0] || gifs[0];
    topGifEl.loading = "lazy";
  }

  function setProgress(){
    const pct = Math.round((i / steps.length) * 100);
    barEl.style.width = `${pct}%`;
    progressEl.textContent = `Question ${i+1} of ${steps.length}`;
  }

  function setStatus(){
    const level = Math.min(4, Math.floor(chaosScore / 4));
    statusPill.textContent = statusByChaos[level];
    jokePill.textContent = rand(jokePills);
  }

  function spawnHearts(n=6, emojiSet=null){
    const emojis = emojiSet || ["💖","💘","💝","💗","💓","💞","🫶","✨","🌸"];
    for(let k=0;k<n;k++){
      const h = document.createElement("div");
      h.className = "heart";
      h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      h.style.left = `${Math.random()*100}%`;
      h.style.setProperty("--drift", `${(Math.random()*240 - 120)}px`);
      h.style.setProperty("--scale", `${(Math.random()*0.8 + 0.7)}`);
      const dur = Math.random()*2.2 + 2.2;
      h.style.animationDuration = `${dur}s`;
      h.style.fontSize = `${Math.floor(Math.random()*14 + 14)}px`;
      document.body.appendChild(h);
      setTimeout(() => h.remove(), dur*1000);
    }
  }

  function showResponse(text){
    responseBox.textContent = text;
    responseBox.style.display = "block";
    responseBox.classList.remove("pop");
    void responseBox.offsetWidth;
    responseBox.classList.add("pop");
  }

  // ---- STEAL A KISS MINI-GAME ----
  function showKissGame(){
    kisses = 0;
    kissBox.style.display = "block";
    kissGame.style.display = "block";
    kissBox.textContent = "Mini-game unlocked: steal 3 kisses 💋 (the button is shy).";
    resetKissBtn();
  }
  function hideKissGame(){
    kissGame.style.display = "none";
    kissBox.style.display = "none";
  }
  function resetKissBtn(){
    kissBtn.style.left = "0px";
    kissBtn.style.top  = "0px";
    kissBtn.style.transform = "scale(1)";
  }
  function dodgeKiss(){
    const area = kissGame.querySelector(".btns");
    const rect = area.getBoundingClientRect();
    const maxX = Math.max(0, rect.width - kissBtn.offsetWidth);
    const maxY = Math.max(0, rect.height - kissBtn.offsetHeight);
    const x = Math.floor(Math.random() * (maxX + 1));
    const y = Math.floor(Math.random() * (maxY + 1));
    const scale = (Math.random() * 0.25) + 0.95;
    kissBtn.style.left = x + "px";
    kissBtn.style.top  = y + "px";
    kissBtn.style.transform = `scale(${scale})`;
  }

  kissBtn.addEventListener("mouseenter", dodgeKiss);
  kissBtn.addEventListener("touchstart", (e) => { e.preventDefault(); dodgeKiss(); });

  kissBtn.addEventListener("click", (e) => {
    e.preventDefault();
    kisses++;
    spawnHearts(14, ["💋","💖","💘","🫶","✨"]);
    kissBox.textContent = `💋 Kiss stolen! Total kisses: ${kisses}.`;
    if (kisses >= 3) {
      kissBox.textContent = "✅ 3 kisses stolen. You win. Congratulations, you are adorable.";
      spawnHearts(24, ["💋","💖","💘","💝","🫶","✨"]);
      setTimeout(() => hideKissGame(), 1200);
    } else {
      dodgeKiss();
    }
  });

  kissDone.addEventListener("click", () => {
    kissBox.textContent = `Okay okay 😌 You stole ${kisses} kiss(es).`;
    setTimeout(() => hideKissGame(), 700);
  });

  // The “No” button: grows + floats away when you try to click/hover/tap.
  function makeNoRunAway(btn){
    btn.classList.add("noFloat");
    btn.title = "Nice try 😌";
    let running = false;
    const flyAway = () => {
      if (running) return;
      running = true;
      const dx = Math.floor(Math.random()*360) - 180;
      const dy = - (Math.floor(Math.random()*180) + 120);
      const scale = (Math.random()*0.7 + 1.6);
      const rot = (Math.random()*30 - 15);
      btn.classList.add("runaway");
      btn.style.transform = `translate(${dx}px, ${dy}px) scale(${scale}) rotate(${rot}deg)`;
      spawnHearts(8, ["😌","💨","🫶","✨"]);
      setTimeout(() => {
        btn.style.transform = "translate(0,0) scale(1) rotate(0deg)";
        btn.classList.remove("runaway");
        running = false;
      }, 520);
    };
    btn.onmouseenter = flyAway;
    btn.ontouchstart = (e) => { e.preventDefault(); flyAway(); };
    btn.onclick = (e) => {
      e.preventDefault();
      btn.classList.add("shake");
      setTimeout(() => btn.classList.remove("shake"), 520);
      showResponse("😌 The 'No' option has flown away for your safety. Try again.");
      flyAway();
    };
  }

  function render(){
    const step = steps[i];
    setTopGif(step);
    setStatus();

    buttonsEl.innerHTML = "";
    responseBox.style.display = "none";
    hideKissGame();
    endNote.style.display = "none";

    typewriter(step.q, questionEl, 14);
    setProgress();
    spawnHearts(3);

    step.choices.forEach((choiceObj, idx) => {
      const b = document.createElement("button");
      b.textContent = choiceObj.t;
      b.className = idx === 0 ? "primary" : "ghost";
      if (choiceObj.isNo) makeNoRunAway(b);
      else b.onclick = () => choose(choiceObj);
      buttonsEl.appendChild(b);
    });
  }

  function choose(choiceObj){
    chaosScore += (choiceObj.chaos || 0);

    const step = steps[i];
    const base = choiceObj.r || `You chose: "${choiceObj.t}"`;
    const extra = rand(extraLines);

    let bonus = null;
    if (typeof step.onPick === "function") bonus = step.onPick(choiceObj.t);

    showResponse(base + " " + extra + (bonus ? (" " + bonus) : ""));
    setStatus();

    if (choiceObj.t.includes("YES") || choiceObj.t.toLowerCase().includes("cling") || choiceObj.t.includes("All of them")) {
      showKissGame();
    } else {
      hideKissGame();
    }

    buttonsEl.innerHTML = "";

    if (i > 0) {
      const back = document.createElement("button");
      back.textContent = "← Back";
      back.className = "ghost";
      back.onclick = () => { i--; render(); };
      buttonsEl.appendChild(back);
    }

    const next = document.createElement("button");
    const last = (i === steps.length - 1);
    next.textContent = last ? "Restart ↺" : "Next →";
    next.className = "primary";
    next.onclick = () => {
      if (last) { i = 0; chaosScore = 0; barEl.style.width = "0%"; render(); }
      else { i++; render(); }
    };
    buttonsEl.appendChild(next);

    barEl.style.width = `${Math.round(((i+1)/steps.length)*100)}%`;
    spawnHearts(last ? 18 : 10);

    if (last) {
      statusPill.textContent = "✅ Valentine accepted. No refunds. 💞";
      jokePill.textContent = "📸 Send a screenshot as proof. (Mandatory.)";
      endNote.style.display = "block";
      endNote.classList.remove("pop");
      void endNote.offsetWidth;
      endNote.classList.add("pop");
      spawnHearts(26, ["💖","💋","🫶","✨","💘"]);
    }
  }

  render();
</script>
</body>
</html>
